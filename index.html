<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로또 추첨기</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #fff8e7;
    }

    h1 {
      font-size: 30pt;
      color: blue;
      text-decoration: underline;
      margin-top: 30px;
      animation: sparkle 1s infinite alternate;
    }

    @keyframes sparkle {
      0% { text-shadow: 0 0 2px #aaa; }
      50% { text-shadow: 0 0 6px #66aaff; }
      100% { text-shadow: 0 0 2px #aaa; }
    }

    .lotto-img {
      width: 400px;
      margin: 20px 0;
    }

    .shake {
      animation: shake 0.2s infinite;
    }

    @keyframes shake {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(2px, 1px) rotate(1deg); }
      50% { transform: translate(-2px, -1px) rotate(-1deg); }
      75% { transform: translate(2px, -1px) rotate(1deg); }
      100% { transform: translate(-2px, 1px) rotate(0deg); }
    }

    button {
      font-size: 24px;
      padding: 15px 35px;
      border: none;
      border-radius: 12px;
      background-color: #ffcc00;
      cursor: pointer;
      font-weight: bold;
    }

    #title {
      font-size: 28px;
      font-weight: bold;
      margin-top: 30px;
      display: none;
    }

    #numbers {
      margin-top: 15px;
      font-size: 28px;
      font-weight: bold;
    }

    .set-box {
      margin-bottom: 15px;
    }

    .set-label {
      display: inline-block;
      width: 80px;
      font-size: 20px;
      color: #333;
    }

    .ball {
      display: inline-block;
      width: 55px;
      height: 55px;
      line-height: 55px;
      margin: 6px;
      border-radius: 50%;
      background-color: gold;
      color: black;
      box-shadow: 2px 2px 5px gray;
      font-size: 28px;
    }

    .credit {
      position: fixed;
      bottom: 10px;
      right: 15px;
      color: gray;
      font-size: 8pt;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <h1>★Lotto 대박 번호 추첨★</h1>

  <img 
    id="machine"
    class="lotto-img"
    src="lotto.png"
    alt="로또기계"
  >

  <br>

  <button onclick="drawLotto()">번호뽑기</button>

  <div id="title">추천 번호</div>
  <div id="numbers"></div>

  <p class="credit">Created by Ai</p>

  <script>
    function makeOneSet() {
      let lotto = [];

      while (lotto.length < 6) {
        let num = Math.floor(Math.random() * 45) + 1;

        if (!lotto.includes(num)) {
          lotto.push(num);
        }
      }

      return lotto.sort((a, b) => a - b);
    }

    function drawLotto() {
      const machine = document.getElementById("machine");
      const title = document.getElementById("title");
      const numbers = document.getElementById("numbers");

      title.style.display = "none";
      numbers.innerHTML = "";

      machine.classList.add("shake");

      setTimeout(() => {
        machine.classList.remove("shake");

        let resultHTML = "";

        for (let set = 1; set <= 5; set++) {
          const lotto = makeOneSet();

          resultHTML += `
            <div class="set-box">
              <span class="set-label">${set}set</span>
              ${lotto.map(n => `<span class="ball">${n}</span>`).join("")}
            </div>
          `;
        }

        title.style.display = "block";
        numbers.innerHTML = resultHTML;

      }, 2000);
    }
  </script>

</body>
</html>
