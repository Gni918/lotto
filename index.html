<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로또 추첨기</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #fff8e7;
    }

    /* 🔥 반짝이는 제목 */
    h1 {
  font-size: 30pt;
  color: blue;
  text-decoration: underline;
  margin-top: 30px;

  animation: sparkle 2s infinite alternate; /* 속도 느리게 */
}

@keyframes sparkle {
  0% {
    text-shadow: 0 0 2px #aaa;
  }
  50% {
    text-shadow: 0 0 6px #66aaff;
  }
  100% {
    text-shadow: 0 0 2px #aaa;
  }
}

    .lotto-img {
      width: 400px;
      margin: 20px 0;
    }

    /* 🔥 기계 흔들림 */
    .shake {
      animation: shake 0.2s infinite;
    }

    @keyframes shake {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(2px, 1px) rotate(1deg); }
      50% { transform: translate(-2px, -1px) rotate(-1deg); }
      75% { transform: translate(2px, -1px) rotate(1deg); }
      100% { transform: translate(-2px, 1px) rotate(0deg); }
    }

    button {
      font-size: 24px;
      padding: 15px 35px;
      border: none;
      border-radius: 12px;
      background-color: #ffcc00;
      cursor: pointer;
      font-weight: bold;
    }

    #title {
      font-size: 28px;
      font-weight: bold;
      margin-top: 30px;
      display: none;
    }

    #numbers {
      margin-top: 15px;
      font-size: 32px;
      font-weight: bold;
    }

    .ball {
      display: inline-block;
      width: 60px;
      height: 60px;
      line-height: 60px;
      margin: 8px;
      border-radius: 50%;
      background-color: gold;
      color: black;
      box-shadow: 2px 2px 5px gray;
    }

    /* 🔥 오른쪽 아래 워터마크 */
    .credit {
      position: fixed;
      bottom: 10px;
      right: 15px;
      color: gray;
      font-size: 8pt;
      opacity: 0.5; /* 살짝 흐리게 */
    }
  </style>
</head>
<body>

  <h1>★Lotto 대박 번호 추첨★</h1>

  <img 
    id="machine"
    class="lotto-img"
    src="lotto.png"
    alt="로또기계"
  >

  <br>

  <button onclick="drawLotto()">번호뽑기</button>

  <div id="title">당첨숫자</div>
  <div id="numbers"></div>

  <!-- 🔥 워터마크 -->
  <p class="credit">Created by Ai</p>

  <script>
    function drawLotto() {
      const machine = document.getElementById("machine");
      const title = document.getElementById("title");
      const numbers = document.getElementById("numbers");

      title.style.display = "none";
      numbers.innerHTML = "";

      machine.classList.add("shake");

      setTimeout(() => {
        machine.classList.remove("shake");

        let lotto = [];

        while (lotto.length < 6) {
          let num = Math.floor(Math.random() * 45) + 1;
          if (!lotto.includes(num)) {
            lotto.push(num);
          }
        }

        lotto.sort((a, b) => a - b);

        title.style.display = "block";

        numbers.innerHTML = lotto
          .map(n => `<span class="ball">${n}</span>`)
          .join("");

      }, 2000);
    }
  </script>

</body>
</html>
