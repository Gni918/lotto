<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title> Ai와 함께하는 행운의 로또 추첨기 :) </title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #fff8e7;
    }

    h1 {
      font-size: 30pt;
      color: red;
      margin-top: 30px;
    }

    .lotto-img {
      width: 500px;
      max-width: 90%;
      border-radius: 20px;
      margin: 20px 0;
    }

    button {
      font-size: 24px;
      padding: 15px 35px;
      border: none;
      border-radius: 12px;
      background-color: #ffcc00;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #ffaa00;
    }

    #title {
      font-size: 28px;
      font-weight: bold;
      margin-top: 30px;
      display: none;
    }

    #numbers {
      margin-top: 15px;
      font-size: 32px;
      font-weight: bold;
    }

    .ball {
      display: inline-block;
      width: 60px;
      height: 60px;
      line-height: 60px;
      margin: 8px;
      border-radius: 50%;
      background-color: gold;
      color: black;
      box-shadow: 2px 2px 5px gray;
    }
  </style>
</head>
<body>

  <h1>Ai와 함께하는 행운의 로또 추첨기</h1>

  <img 
  class="lotto-img"
  src="lotto.png"
  alt="로또추첨기"
>

  <br>

  <button onclick="drawLotto()">번호뽑기</button>

  <div id="title">당첨숫자</div>
  <div id="numbers"></div>

  <script>
    function drawLotto() {
      let lotto = [];

      while (lotto.length < 6) {
        let number = Math.floor(Math.random() * 45) + 1;

        if (!lotto.includes(number)) {
          lotto.push(number);
        }
      }

      lotto.sort(function(a, b) {
        return a - b;
      });

      document.getElementById("title").style.display = "block";

      document.getElementById("numbers").innerHTML = lotto
        .map(num => `<span class="ball">${num}</span>`)
        .join("");
    }
  </script>

</body>
</html>
